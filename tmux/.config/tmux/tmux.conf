
###-- Prefix & Reload ---
unbind C-b
unbind r
set -g prefix C-s
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

### --- Terminal & Colors ---
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",*:RGB"

### --- Clipboard ---
set -g set-clipboard on

### --- Enable Mouse Support ---
set -g mouse on

### --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

### --- Scrollback ---
set -g history-limit 50000

### --- Split Panes ---
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

### --- Pane Navigation (Vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

### --- Resize Panes ---
bind -r m resize-pane -Z
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

### --- Attach from Current Path ---
bind M-c attach-session -c "#{pane_current_path}"

### --- Launch Claude in a new session (prefix + C) ---
# Names the session "claude-<dir>", reuses it if it already exists.
bind C run-shell 'name="claude-#{b:pane_current_path}"; \
  tmux has-session -t "=$name" 2>/dev/null \
  && tmux switch-client -t "=$name" \
  || tmux new-session -d -s "$name" -c "#{pane_current_path}" "claude"; \
  tmux switch-client -t "=$name"'

### --- Copy Mode (Vim-style) ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

### --- Escape Timing ---
set -sg escape-time 10

### --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

### --- Session Manager (sessionx) ---
# prefix + o  ->  fuzzy session switcher / creator
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-preview-enabled 'true'

### --- Session Persistence ---
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @minimal-tmux-bg "#5eacd3"
# set -g @minimal-tmux-fg "#333333"
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-left-arrow ""
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-indicator-str "  "

### --- Pane Borders ---
set -g pane-border-style 'fg=#3b4252'
set -g pane-active-border-style 'fg=#5eacd3'
setw -g pane-base-index 1
# set -g pane-border-lines medium
### --- Status Bar Position ---
# set -g status-position top
set -g pane-border-status off

### --- Initialize TPM ---
run '~/.config/tmux/plugins/tpm/tpm'
